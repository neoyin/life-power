name: life_power_client
description: A Flutter app for LifePower - 守望电量
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  dio: ^5.4.3+1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  lottie: ^2.7.0
  step_logger: ^1.0.0-beta.2
  permission_handler: ^11.0.0
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
